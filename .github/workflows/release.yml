name: Release build

# Builds the release APK on a clean runner so the published APK is reproducible
# Triggered by pushing a `v*` tag that matches `app-versionName` in
#  gradle/libs.versions.toml, e.g. tag v1.0.0-RC3.
#
# If the signing secrets are configured, the APK is signed with the release key
# and attached to a *draft* GitHub release for the tag — add release notes and
# publish it as-is (do NOT replace the APK afterwards, that breaks reproducible
# build verification). Without the secrets, an unsigned APK is uploaded as a
# workflow artifact instead, to be signed locally with apksigner.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin # Eclipse Temurin = OpenJDK build
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Read versionName from the version catalog
        id: version
        run: |
          VERSION="$(grep -m1 '^app-versionName' gradle/libs.versions.toml | cut -d '"' -f2)"
          if [ -z "$VERSION" ]; then
            echo "::error::Could not read app-versionName from gradle/libs.versions.toml"
            exit 1
          fi
          echo "name=$VERSION" >> "$GITHUB_OUTPUT"
          echo "versionName: $VERSION"

      # Guards against the "APK built from a different commit than the release
      # tag" failure mode: the tag must be v<versionName>.
      - name: Verify tag matches versionName
        if: github.ref_type == 'tag'
        run: |
          if [ "$GITHUB_REF_NAME" != "v${{ steps.version.outputs.name }}" ]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match app-versionName ${{ steps.version.outputs.name }} — bump gradle/libs.versions.toml in the tagged commit, or fix the tag."
            exit 1
          fi

      - name: Build release APK
        run: ./gradlew :app:assembleRelease

      - name: Sign APK
        id: sign
        env:
          SIGNING_KEYSTORE_BASE64: ${{ secrets.SIGNING_KEYSTORE_BASE64 }}
          SIGNING_KEYSTORE_PASSWORD: ${{ secrets.SIGNING_KEYSTORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: |
          UNSIGNED="app/build/outputs/apk/release/app-release-unsigned.apk"
          mkdir -p dist

          if [ -z "$SIGNING_KEYSTORE_BASE64" ]; then
            echo "::warning::Signing secrets not configured — uploading unsigned APK as artifact only, no release draft. Sign it locally with apksigner."
            cp "$UNSIGNED" "dist/app-release-unsigned.apk"
            echo "signed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          KEYSTORE="$RUNNER_TEMP/keystore.jks"
          echo "$SIGNING_KEYSTORE_BASE64" | base64 -d > "$KEYSTORE"
          BUILD_TOOLS="$(ls -d "$ANDROID_HOME"/build-tools/* | sort -V | tail -n1)"

          # Alignment check only — never rewrite the zip here, or the entries
          # would no longer match what verifiers rebuild from source.
          "$BUILD_TOOLS/zipalign" -c 4 "$UNSIGNED"

          # apksigner enables v1+v2+v3 automatically based on minSdk; verifiers
          # strip the signature before comparing, so signing keeps the APK
          # reproducible.
          "$BUILD_TOOLS/apksigner" sign \
            --ks "$KEYSTORE" \
            --ks-pass env:SIGNING_KEYSTORE_PASSWORD \
            --ks-key-alias "$SIGNING_KEY_ALIAS" \
            --key-pass env:SIGNING_KEY_PASSWORD \
            --out "dist/app-release.apk" \
            "$UNSIGNED"
          rm -f "$KEYSTORE"

          "$BUILD_TOOLS/apksigner" verify --print-certs "dist/app-release.apk"
          echo "signed=true" >> "$GITHUB_OUTPUT"

      - name: Checksums
        run: |
          cd dist
          sha256sum * > SHA256SUMS.txt
          {
            echo "### Build outputs"
            echo '```'
            cat SHA256SUMS.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: Farhan-${{ steps.version.outputs.name }}
          path: dist/*
          if-no-files-found: error

      - name: Draft GitHub release
        if: github.ref_type == 'tag' && steps.sign.outputs.signed == 'true'
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            dist/app-release*.apk
            dist/SHA256SUMS.txt
